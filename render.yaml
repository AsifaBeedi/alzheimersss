services:
  - name: mitra-backend
    type: web
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/mitra_demo.db
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_ECHO
        value: "false"
    disk:
      name: mitra-data
      mountPath: /data
      sizeGB: 1

  - name: mitra-frontend
    type: web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
